<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>상품 등록</title>
</head>
<body>
<h2>상품 등록</h2>
<form action="insert" method="post" enctype="multipart/form-data">
	<p>상품명:<input type="text" name="name"></p>
	<p>가격:<input type="number" name="price"></p>
	<p>수량:<input type="number" name="amount"></p> 
	<p>상품이미지:<input type="file" name="file"></p> 
	<hr>
	<button type="submit">등록</button>
	<a th:href="@{/product/list}">목록으로</a>
</form>
</body>
</html>
