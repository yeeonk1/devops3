<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      th:replace="~{layout/default_layout :: layout(~{::section})}">
<head>
    <title>로그인</title>
</head>
<body>
    <section>
        <div style="text-align: center; margin-bottom: 30px;">
            <h2>LOGIN</h2>
            <p>서비스 이용을 위해 로그인해 주세요.</p>
        </div>

        <div th:if="${#authorization.expression('isAnonymous()')}">
            <form th:action="@{/member/loginProc.do}" method="post">
                <table class="board_detail" style="max-width: 450px; margin: 0 auto;">
                    <colgroup>
                        <col width="30%" />
                        <col width="70%" />
                    </colgroup>
                    <tbody>
                        <tr>
                            <th>아이디</th>
                            <td><input type="text" name="userId" required /></td>
                        </tr>
                        <tr>
                            <th>비밀번호</th>
                            <td><input type="password" name="password" required /></td>
                        </tr>
                    </tbody>
                </table>
                <div style="text-align: center; margin-top: 20px;">
                    <button type="submit" class="btn">로그인</button>
                    <a th:href="@{/member/join.do}" class="btn" style="background:#999;">회원가입</a>
                </div>
            </form>
        </div>

        <div th:if="${#authorization.expression('isAuthenticated()')}" style="text-align: center; padding: 40px 0;">
            <h3>반갑습니다, <span th:text="${#authentication.name}"></span>님!</h3>
            <a th:href="@{/board/openBoardList.do}" class="btn">게시판 입장</a>
        </div>
    </section>
</body>
</html>
